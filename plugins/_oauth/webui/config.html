<html>
<head>
  <title>OAuth Connections</title>
  <script type="module">
    import { store } from "/plugins/_oauth/webui/oauth-config-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.oauthConfig && config">
      <div
        class="oauth"
        x-init="$store.oauthConfig.init(config, context)"
        x-effect="$store.oauthConfig.bindConfig(config)"
        x-destroy="$store.oauthConfig.cleanup()"
      >
        <section class="oauth-provider-list">
          <div class="oauth-section-head">
            <div>
              <h3>Providers</h3>
              <p>Each account can be connected independently.</p>
            </div>
            <button class="oauth-icon-button" type="button" @click="$store.oauthConfig.loadStatus()" title="Refresh status" aria-label="Refresh status">
              <span class="material-symbols-outlined">refresh</span>
            </button>
          </div>

          <div class="oauth-provider-rows">
            <template x-for="card in $store.oauthConfig.providerCards()" :key="card.provider_id">
              <article
                class="oauth-provider-row"
                :class="{ selected: $store.oauthConfig.selectedProviderId === card.provider_id, connected: card.connected }"
                @click="$store.oauthConfig.selectProvider(card.provider_id)"
              >
                <span class="oauth-mark" :class="{ connected: card.connected }">
                  <span class="material-symbols-outlined" x-text="card.connected ? 'check' : card.mark"></span>
                </span>
                <div class="oauth-provider-row-copy">
                  <strong x-text="card.display_name"></strong>
                  <span x-text="$store.oauthConfig.providerReadinessLabel(card.provider_id)"></span>
                </div>
                <span class="oauth-account-state" :class="{ connected: card.connected }" x-text="card.connected ? 'Connected' : 'Available'"></span>
                <div class="oauth-row-actions">
                  <button
                    class="oauth-connect compact"
                    type="button"
                    @click.stop="$store.oauthConfig.handleProviderPrimary(card.provider_id)"
                    :disabled="$store.oauthConfig.providerPrimaryDisabled(card.provider_id)"
                    x-show="!card.connected"
                  >
                    <span class="material-symbols-outlined" x-text="$store.oauthConfig.connectingProvider === card.provider_id ? 'progress_activity' : ($store.oauthConfig.providerSetupReady(card.provider_id) ? 'login' : 'tune')"></span>
                    <span x-text="$store.oauthConfig.providerPrimaryLabel(card.provider_id)"></span>
                  </button>
                  <button
                    class="oauth-connect secondary compact"
                    type="button"
                    @click.stop="$store.oauthConfig.loadModels({ providerId: card.provider_id })"
                    :disabled="!card.connected || $store.oauthConfig.loadingModelsProvider === card.provider_id"
                  >
                    <span class="material-symbols-outlined" x-text="$store.oauthConfig.loadingModelsProvider === card.provider_id ? 'progress_activity' : 'search'"></span>
                    <span>Check models</span>
                  </button>
                  <button
                    class="oauth-connect danger compact"
                    type="button"
                    @click.stop="$store.oauthConfig.disconnectProvider(card.provider_id)"
                    :disabled="$store.oauthConfig.disconnectingProvider === card.provider_id"
                    x-show="card.connected"
                  >
                    <span class="material-symbols-outlined" x-text="$store.oauthConfig.disconnectingProvider === card.provider_id ? 'progress_activity' : 'link_off'"></span>
                    <span x-text="$store.oauthConfig.disconnectingProvider === card.provider_id ? 'Disconnecting' : 'Disconnect'"></span>
                  </button>
                </div>
                <div class="oauth-provider-usage" x-show="$store.oauthConfig.usageWindows(card.provider_id).length">
                  <template x-for="window in $store.oauthConfig.usageWindows(card.provider_id)" :key="`${card.provider_id}-${window.key}`">
                    <div class="oauth-usage-window">
                      <div class="oauth-usage-head">
                        <span>
                          <span x-text="`${card.short_name || card.display_name || 'Account'} ${window.title}`"></span>
                          <small x-show="$store.oauthConfig.formatWindowLabel(window)" x-text="$store.oauthConfig.formatWindowLabel(window)"></small>
                        </span>
                        <strong x-text="$store.oauthConfig.formatRemainingPercent(window)"></strong>
                      </div>
                      <div class="oauth-usage-bar" aria-hidden="true">
                        <i :style="{ width: $store.oauthConfig.usageWidth(window) }"></i>
                      </div>
                      <p x-show="$store.oauthConfig.formatReset(window)" x-text="`Resets in ${$store.oauthConfig.formatReset(window)}`"></p>
                    </div>
                  </template>
                </div>
              </article>
            </template>
          </div>
        </section>

        <template x-if="$store.oauthConfig.selectedProvider() && !$store.oauthConfig.selectedProvider().connected">
          <section class="oauth-provider-detail">
            <div class="oauth-provider-detail-head">
              <div class="oauth-provider-head">
                <div class="oauth-mark" :class="{ connected: $store.oauthConfig.selectedProvider().connected }">
                  <span class="material-symbols-outlined" x-text="$store.oauthConfig.selectedProvider().connected ? 'check' : $store.oauthConfig.selectedProvider().mark"></span>
                </div>
                <div class="oauth-copy">
                  <h2 x-text="$store.oauthConfig.selectedProvider().display_name"></h2>
                  <p x-text="$store.oauthConfig.providerStatusLabel($store.oauthConfig.selectedProviderId)"></p>
                </div>
              </div>
              <div class="oauth-primary">
                <button
                  class="oauth-connect"
                  type="button"
                  @click="$store.oauthConfig.connectProvider($store.oauthConfig.selectedProviderId)"
                  :disabled="$store.oauthConfig.providerPrimaryDisabled($store.oauthConfig.selectedProviderId) || !$store.oauthConfig.providerSetupReady($store.oauthConfig.selectedProviderId)"
                  x-show="!$store.oauthConfig.selectedProvider().connected"
                >
                  <span class="material-symbols-outlined" x-text="$store.oauthConfig.connectingProvider === $store.oauthConfig.selectedProviderId ? 'progress_activity' : 'login'"></span>
                  <span x-text="$store.oauthConfig.providerPrimaryLabel($store.oauthConfig.selectedProviderId)"></span>
                </button>
              </div>
            </div>

            <div class="oauth-detail-grid">
              <label class="oauth-provider-input" x-show="$store.oauthConfig.selectedProvider().supports_enterprise_domain && !$store.oauthConfig.selectedProvider().connected">
                <span>Enterprise domain</span>
                <input
                  type="text"
                  x-model="$store.oauthConfig.providerUiFor($store.oauthConfig.selectedProviderId).enterprise_domain"
                  name="enterprise_domain"
                  placeholder="github.com"
                />
              </label>

              <div class="oauth-provider-fields" x-show="$store.oauthConfig.selectedProvider().supports_oauth_client_config && !$store.oauthConfig.selectedProvider().connected">
                <label class="oauth-provider-input">
                  <span>OAuth client ID</span>
                  <input
                    type="text"
                    x-model="$store.oauthConfig.providerUiFor($store.oauthConfig.selectedProviderId).client_id"
                    name="oauth_client_id"
                    placeholder="Google Cloud OAuth client ID"
                  />
                </label>
                <label class="oauth-provider-input">
                  <span>OAuth client secret</span>
                  <input
                    type="password"
                    x-model="$store.oauthConfig.providerUiFor($store.oauthConfig.selectedProviderId).client_secret"
                    name="oauth_client_secret"
                    autocomplete="off"
                    placeholder="Google Cloud OAuth client secret"
                  />
                </label>
                <label class="oauth-provider-input" x-show="$store.oauthConfig.selectedProvider().supports_quota_project">
                  <span>Quota project</span>
                  <input
                    type="text"
                    x-model="$store.oauthConfig.providerUiFor($store.oauthConfig.selectedProviderId).quota_project_id"
                    name="quota_project_id"
                    placeholder="Optional Google Cloud project ID"
                  />
                </label>
              </div>

              <div class="oauth-device" x-show="$store.oauthConfig.devices[$store.oauthConfig.selectedProviderId]?.user_code">
                <span>Enter this code</span>
                <strong x-text="$store.oauthConfig.devices[$store.oauthConfig.selectedProviderId]?.user_code"></strong>
                <button class="text-button" type="button" @click="$store.oauthConfig.cancelConnect($store.oauthConfig.selectedProviderId)">
                  <span class="material-symbols-outlined">close</span>
                  <span>Cancel</span>
                </button>
              </div>

              <div class="oauth-manual-callback" x-show="$store.oauthConfig.selectedProvider().supports_manual_callback && $store.oauthConfig.devices[$store.oauthConfig.selectedProviderId]?.flow === 'browser_pkce' && !$store.oauthConfig.selectedProvider().connected">
                <input
                  type="text"
                  x-model="$store.oauthConfig.providerUiFor($store.oauthConfig.selectedProviderId).manualCallback"
                  placeholder="Paste callback URL, query string, or code"
                />
                <button type="button" class="oauth-connect secondary" @click="$store.oauthConfig.submitManualCallback($store.oauthConfig.selectedProviderId)">
                  <span class="material-symbols-outlined">check</span>
                  <span>Submit</span>
                </button>
                <button type="button" class="oauth-connect secondary" @click="$store.oauthConfig.cancelConnect($store.oauthConfig.selectedProviderId)">
                  <span class="material-symbols-outlined">close</span>
                  <span>Cancel</span>
                </button>
              </div>

              <div class="oauth-auth-attempt" x-show="$store.oauthConfig.devices[$store.oauthConfig.selectedProviderId] && !$store.oauthConfig.devices[$store.oauthConfig.selectedProviderId]?.user_code && !$store.oauthConfig.selectedProvider().supports_manual_callback">
                <span>Sign-in started</span>
                <button class="text-button" type="button" @click="$store.oauthConfig.cancelConnect($store.oauthConfig.selectedProviderId)">
                  <span class="material-symbols-outlined">close</span>
                  <span>Cancel</span>
                </button>
              </div>

              <p class="oauth-provider-note" x-show="$store.oauthConfig.selectedProvider().warning || $store.oauthConfig.selectedProvider().note" x-text="$store.oauthConfig.selectedProvider().warning || $store.oauthConfig.selectedProvider().note"></p>
            </div>
          </section>
        </template>

        <section class="oauth-model-config">
          <div class="oauth-section-head">
            <div>
              <h3>Choose your models</h3>
              <p>Select account-backed models used by the Main model and Utility model slots.</p>
            </div>
            <span class="oauth-save-chip" x-show="$store.oauthConfig.modelConfigDirty">Pending changes</span>
          </div>

          <div class="oauth-model-loading" x-show="$store.oauthConfig.modelConfigLoading">
            Loading model configuration...
          </div>

          <template x-if="$store.oauthConfig.modelConfig">
            <div class="oauth-model-grid">
              <template x-for="slot in $store.oauthConfig.modelSlots" :key="slot.key">
                <div class="oauth-model-card">
                  <div class="oauth-model-head">
                    <span class="oauth-model-icon material-symbols-outlined" x-text="slot.icon"></span>
                    <div class="oauth-model-title">
                      <strong x-text="slot.title"></strong>
                      <span x-text="$store.oauthConfig.slotStatusLabel(slot.key)"></span>
                    </div>
                    <div class="oauth-model-actions">
                      <button
                        class="oauth-model-action icon"
                        type="button"
                        title="Copy Main model"
                        aria-label="Copy Main model"
                        x-show="slot.key === 'utility_model' && $store.oauthConfig.slotUsesOauth('chat_model')"
                        @click="$store.oauthConfig.copyMainToUtility()"
                      >
                        <span class="material-symbols-outlined">content_copy</span>
                      </button>
                    </div>
                  </div>

                  <p class="oauth-model-description" x-text="slot.description"></p>

                  <div class="oauth-model-picker" @click.outside="$store.oauthConfig.closeModelDropdown(slot.key)">
                    <div class="oauth-model-input-row">
                      <input
                        type="text"
                        x-model="$store.oauthConfig.modelSlot(slot.key).name"
                        @input="$store.oauthConfig.markModelDirty(slot.key)"
                        @focus="$store.oauthConfig.openModelDropdown(slot.key)"
                        :disabled="!$store.oauthConfig.slotUsesOauth(slot.key)"
                        placeholder="Search or enter a provider model"
                      />
                      <button
                        class="oauth-model-search"
                        type="button"
                        title="Check models"
                        aria-label="Check models"
                        @click="$store.oauthConfig.loadModels({ providerId: $store.oauthConfig.modelSlot(slot.key).provider, openDropdown: slot.key })"
                        :disabled="!$store.oauthConfig.slotUsesOauth(slot.key) || !$store.oauthConfig.providerConnected($store.oauthConfig.modelSlot(slot.key).provider) || $store.oauthConfig.loadingModelsProvider === $store.oauthConfig.modelSlot(slot.key).provider"
                      >
                        <span class="material-symbols-outlined" x-text="$store.oauthConfig.loadingModelsProvider === $store.oauthConfig.modelSlot(slot.key).provider ? 'progress_activity' : 'search'"></span>
                      </button>
                    </div>

                    <div
                      class="oauth-model-dropdown"
                      x-show="$store.oauthConfig.modelDropdown[slot.key]?.open && !$store.oauthConfig.loadingModelsProvider"
                      x-transition.opacity
                    >
                      <template x-for="model in $store.oauthConfig.filteredModels(slot.key)" :key="slot.key + model">
                        <button
                          type="button"
                          class="oauth-model-item"
                          @click="$store.oauthConfig.selectModel(slot.key, model)"
                          x-text="model"
                        ></button>
                      </template>
                      <div class="oauth-model-item muted" x-show="$store.oauthConfig.filteredModels(slot.key).length === 0">
                        No models found. You can still type the model name manually.
                      </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </section>

        <section class="oauth-models-panel" x-show="$store.oauthConfig.models.length">
          <div class="oauth-section-head">
            <div>
              <h3>Available models</h3>
              <p>Available models from selected provider</p>
            </div>
          </div>
          <div class="oauth-models">
            <template x-for="model in $store.oauthConfig.models" :key="model">
              <span x-text="model"></span>
            </template>
          </div>
        </section>

        <details class="oauth-advanced">
          <summary>Advanced</summary>

          <div class="oauth-details">
            <div>
              <span>Codex endpoint</span>
              <code x-text="$store.oauthConfig.providerEndpointUrl('codex_oauth')"></code>
            </div>
            <div>
              <span>Auth file</span>
              <code x-text="$store.oauthConfig.status?.codex?.auth_file_path || 'Agent Zero private store'"></code>
            </div>
          </div>

          <div class="oauth-grid">
            <label>
              <span>Auth file path</span>
              <input type="text" x-model="$store.oauthConfig.codex().auth_file_path" placeholder="Agent Zero private store" />
              <small>Use an Agent Zero-owned file. Shared Codex CLI auth files are rejected.</small>
            </label>
            <label>
              <span>Codex issuer</span>
              <input type="text" x-model="$store.oauthConfig.codex().issuer" />
            </label>
            <label>
              <span>Codex token URL</span>
              <input type="text" x-model="$store.oauthConfig.codex().token_url" />
            </label>
            <label>
              <span>Codex base path</span>
              <input type="text" x-model="$store.oauthConfig.codex().proxy_base_path" />
            </label>
            <label>
              <span>Codex upstream URL</span>
              <input type="text" x-model="$store.oauthConfig.codex().upstream_base_url" />
            </label>
            <label>
              <span>Codex version</span>
              <input type="text" x-model="$store.oauthConfig.codex().codex_version" placeholder="Auto" />
            </label>
            <label class="oauth-switch">
              <span>Codex proxy token required</span>
              <input type="checkbox" x-model="$store.oauthConfig.codex().require_proxy_token" />
            </label>
            <label>
              <span>Codex proxy token</span>
              <input type="password" x-model="$store.oauthConfig.codex().proxy_token" autocomplete="off" />
            </label>
          </div>
        </details>
      </div>
    </template>
  </div>

  <style>
    .oauth {
      display: flex;
      flex-direction: column;
      gap: 14px;
      color: var(--color-text);
    }

    .oauth-provider-list,
    .oauth-provider-detail {
      display: grid;
      gap: 12px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .oauth-provider-row-copy strong {
      overflow: hidden;
      display: block;
      font-size: 0.88rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .oauth-provider-rows {
      display: grid;
      gap: 8px;
    }

    .oauth-provider-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--color-border) 72%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--color-background) 24%, transparent);
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease;
    }

    .oauth-provider-row:hover,
    .oauth-provider-row.selected {
      border-color: color-mix(in srgb, var(--color-primary) 62%, var(--color-border));
      background: color-mix(in srgb, var(--color-primary) 7%, var(--color-panel));
    }

    .oauth-provider-row-copy {
      display: grid;
      min-width: 0;
      gap: 3px;
    }

    .oauth-provider-row-copy span {
      overflow: hidden;
      color: var(--color-text-secondary);
      font-size: 0.74rem;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .oauth-account-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid color-mix(in srgb, var(--color-border) 74%, transparent);
      border-radius: 999px;
      color: var(--color-text-secondary);
      font-size: 0.68rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .oauth-account-state.connected {
      border-color: color-mix(in srgb, #35d07f 46%, var(--color-border));
      color: var(--color-text);
    }

    .oauth .oauth-provider-row.connected .oauth-provider-row-copy strong {
      color: var(--color-text, #fff);
    }

    .oauth .oauth-provider-row.connected .oauth-provider-row-copy span {
      color: var(--color-text-secondary, rgba(255, 255, 255, .72));
    }

    .oauth-row-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .oauth-provider-usage {
      display: grid;
      grid-column: 2 / -1;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      min-width: 0;
      padding: 4px 0 0;
    }

    .oauth-provider-detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .oauth-detail-grid {
      display: grid;
      gap: 12px;
    }

    .oauth-provider-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .oauth-provider-card {
      display: grid;
      align-content: start;
      gap: 14px;
      min-width: 0;
      min-height: 188px;
      padding: 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--color-panel) 86%, transparent);
    }

    .oauth-provider-card.is-connected .oauth-mark {
      color: #08120c;
      background: #35d07f;
    }

    .oauth-mark.connected {
      color: #08120c;
      background: #35d07f;
    }

    .oauth-provider-head {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }

    .oauth-mark {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border-radius: 50%;
      background: color-mix(in srgb, var(--color-border) 52%, transparent);
    }

    .oauth-mark .material-symbols-outlined {
      font-size: 26px;
    }

    .oauth-copy h2 {
      margin: 0 0 4px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .oauth-copy p {
      overflow: hidden;
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 0.82rem;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .oauth-primary {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 8px;
    }

    .oauth-connect {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 112px;
      min-height: 38px;
      padding: 0 13px;
      border: 0;
      border-radius: 8px;
      background: #f5f7fa;
      color: #111418;
      font: inherit;
      font-size: 0.84rem;
      font-weight: 750;
      cursor: pointer;
    }

    .oauth-connect.secondary {
      border: 1px solid color-mix(in srgb, var(--color-border) 76%, transparent);
      background: color-mix(in srgb, var(--color-border) 44%, transparent);
      color: var(--color-text);
    }

    .oauth-connect.danger {
      border: 1px solid color-mix(in srgb, #f06464 40%, var(--color-border));
      background: color-mix(in srgb, #f06464 16%, var(--color-panel));
      color: var(--color-text);
    }

    .oauth-connect:disabled {
      cursor: default;
      opacity: .65;
    }

    .oauth-connect.compact {
      min-width: 0;
      min-height: 34px;
      padding: 0 10px;
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .oauth-provider-input,
    .oauth-provider-fields,
    .oauth-manual-callback,
    .oauth-auth-attempt {
      display: grid;
      min-width: 0;
      gap: 6px;
    }

    .oauth-provider-fields {
      gap: 8px;
    }

    .oauth-manual-callback {
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
    }

    .oauth-auth-attempt {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, #f5f7fa 18%, var(--color-border));
      border-radius: 8px;
      background: color-mix(in srgb, #f5f7fa 7%, var(--color-panel));
    }

    .oauth-provider-input span,
    .oauth-auth-attempt span {
      color: var(--color-text-secondary);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .oauth-provider-input input,
    .oauth-manual-callback input {
      width: 100%;
      min-width: 0;
      min-height: 36px;
      padding: 7px 10px;
      border: 1px solid color-mix(in srgb, var(--color-border) 74%, transparent);
      border-radius: 8px;
      background: var(--color-input);
      color: var(--color-text);
      font: inherit;
      font-size: 0.82rem;
    }

    .oauth-provider-note {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .oauth-device {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, #f5f7fa 18%, var(--color-border));
      border-radius: 8px;
      background: color-mix(in srgb, #f5f7fa 7%, var(--color-panel));
    }

    .oauth-device span {
      color: var(--color-text-secondary);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .oauth-device strong {
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .oauth-usage-window {
      display: grid;
      min-width: 0;
      gap: 8px;
    }

    .oauth-usage-head {
