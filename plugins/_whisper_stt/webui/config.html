<html>
<head>
  <title>Whisper STT</title>
</head>

<body>
  <div x-data>
    <template x-if="config">
      <div class="plugin-config-page">
        <div class="section-title">Whisper STT</div>
        <div class="section-description">
          Configure the built-in Whisper speech-to-text provider. Browser microphone
          device selection stays local to the Web UI and is managed from the plugin status panel.
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Model Size</div>
            <div class="field-description">
              Whisper model variant loaded by the backend runtime.
            </div>
          </div>
          <div class="field-control">
            <select x-model="config.model_size">
              <option value="tiny">Tiny</option>
              <option value="base">Base</option>
              <option value="small">Small</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
              <option value="turbo">Turbo</option>
            </select>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Language</div>
            <div class="field-description">
              Language hint forwarded to Whisper. Use <code>auto</code> to let Whisper detect it.
            </div>
          </div>
          <div class="field-control">
            <input type="text" x-model="config.language" placeholder="en" />
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Voice Message Handling</div>
            <div class="field-description">
              Choose whether final transcriptions are sent immediately or left in the composer for review.
            </div>
          </div>
          <div class="field-control">
            <select x-model="config.message_mode">
              <option value="send">Send immediately</option>
              <option value="draft">Draft in composer</option>
            </select>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Silence Threshold</div>
            <div class="field-description">
              Minimum detected signal before voice input switches from listening to recording.
            </div>
          </div>
          <div class="field-control">
            <input type="range" min="0" max="1" step="0.01" x-model.number="config.silence_threshold" />
            <span class="range-value" x-text="config.silence_threshold"></span>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Silence Duration</div>
            <div class="field-description">
              Milliseconds of silence required before the recording enters the waiting phase.
            </div>
          </div>
          <div class="field-control">
            <input type="number" min="100" step="100" x-model.number="config.silence_duration" />
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Waiting Timeout</div>
            <div class="field-description">
              Milliseconds to wait after silence before audio is sent for transcription.
            </div>
          </div>
          <div class="field-control">
            <input type="number" min="100" step="100" x-model.number="config.waiting_timeout" />
          </div>
        </div>
      </div>
    </template>
  </div>
</body>
</html>
